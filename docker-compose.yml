version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sindaval_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sindaval_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sindaval_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sindaval_api
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: sindaval_db
    depends_on:
      - postgres
    networks:
      - sindaval_network
    volumes:
      - ./.env:/app/.env

volumes:
  postgres_data:

networks:
  sindaval_network:
    driver: bridge
